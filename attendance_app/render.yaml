services:
  - type: web
    name: attendance-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-database
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: attendance-database
    plan: free
